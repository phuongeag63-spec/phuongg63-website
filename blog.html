<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --gold:#ffd36a;--gold2:#ff9f1c;--bg:#07040b;--surface:#0f0b16;
  --surface2:#16101f;--cyan:#24e6ff;--muted:#6b6480;
  --green:#3ddc84;--red:#ff5c5c;
}

body{background:var(--bg);color:#fff;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:rgba(7,4,11,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,211,106,.12);padding:0 24px;display:flex;align-items:center;gap:20px;height:56px}
.nav-brand{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;white-space:nowrap}
.nav-links{display:flex;gap:16px;flex:1;flex-wrap:wrap}
.nav-links a{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}

/* ── HERO ── */
.hero{padding:80px 24px 56px;text-align:center;background:radial-gradient(ellipse at 50% 0%,rgba(255,211,106,.08),transparent 60%)}
.hero-eyebrow{font-size:11px;font-weight:900;letter-spacing:4px;color:rgba(255,211,106,.5);text-transform:uppercase;margin-bottom:16px}
.hero h1{font-size:clamp(32px,6vw,56px);font-weight:900;background:linear-gradient(135deg,#fff 0%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
.hero p{font-size:16px;color:var(--muted);max-width:540px;margin:0 auto 32px;line-height:1.7}

/* ── FILTERS ── */
.filter-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 24px 32px}
.filter-btn{padding:8px 18px;border-radius:999px;border:1.5px solid rgba(255,211,106,.2);background:transparent;color:rgba(255,211,106,.6);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .2s}
.filter-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(255,211,106,.06)}
.filter-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:transparent;color:#07040b}

/* ── MAIN GRID ── */
.container{max-width:1100px;margin:0 auto;padding:0 24px 80px}
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}

/* ── CARD ── */
.post-card{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;transition:transform .25s,box-shadow .25s,border-color .25s;text-decoration:none;color:inherit}
.post-card:hover{transform:translateY(-5px);box-shadow:0 20px 60px rgba(0,0,0,.5);border-color:rgba(255,211,106,.3)}
.post-card .card-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--surface2)}
.post-card .card-img-placeholder{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1025,#0f0b16);font-size:40px}
.post-card .card-body{padding:20px;display:flex;flex-direction:column;gap:8px;flex:1}
.post-card .card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-cat{font-size:11px;font-weight:900;letter-spacing:1px;padding:4px 10px;border-radius:999px;background:rgba(255,211,106,.12);color:var(--gold);text-transform:uppercase}
.card-result{font-size:11px;font-weight:900;letter-spacing:1px;padding:4px 10px;border-radius:999px}
.result-win{background:rgba(61,220,132,.12);color:var(--green)}
.result-lose{background:rgba(255,92,92,.12);color:var(--red)}
.result-break{background:rgba(255,211,106,.1);color:rgba(255,211,106,.7)}
.post-card .card-date{font-size:12px;color:var(--muted)}
.post-card h3{font-size:17px;font-weight:900;color:#fff;line-height:1.4;margin-top:4px}
.post-card p{font-size:13px;color:var(--muted);line-height:1.6;flex:1}
.card-read{font-size:12px;font-weight:900;color:var(--gold);margin-top:8px;letter-spacing:.5px}

/* ── STATUS ── */
.status-msg{text-align:center;padding:60px 24px;color:var(--muted);font-size:14px}
.status-msg .icon{font-size:40px;margin-bottom:16px}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid rgba(255,211,106,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
footer{border-top:1px solid rgba(255,255,255,.06);padding:40px 24px;text-align:center;color:var(--muted);font-size:13px}
footer a{color:var(--gold);text-decoration:none}
</style>
</head>

    <a href="/#order">Đặt mua</a>

  </div>
</nav>

<div class="hero">
  <div class="hero-eyebrow">Hành trình thật · Giao dịch thật</div>
  <h1>Nhật ký & Bài viết</h1>
  <p>Nhật ký lệnh, kinh nghiệm trading và những câu chuyện thật từ thị trường tài chính.</p>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="setFilter('all')">Tất cả</button>
  <button class="filter-btn" onclick="setFilter('Câu chuyện')">Câu chuyện</button>
  <button class="filter-btn" onclick="setFilter('Nhật ký lệnh')">Nhật ký lệnh</button>

  <button class="filter-btn" onclick="setFilter('Trading')">Trading</button>

<div class="container">
  <div id="postsGrid" class="posts-grid">
    <div class="status-msg" style="grid-column:1/-1">

    </div>

</div>

<footer>
  <div style="margin-bottom:8px">© 2025 Phương G63 Enterprise</div>
  <div><a href="/">Trang chủ</a> · <a href="/#products">Sản phẩm</a> · <a href="https://zalo.me/84822299993">Zalo hỗ trợ</a></div>
</footer>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────
const REPO     = 'phuongeag63-spec/phuongg63-website';
const BRANCH   = 'main';
const API_BASE = `https://api.github.com/repos/${REPO}/contents/nhat-ky?ref=${BRANCH}`;
const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/nhat-ky/`;

// Bài viết cũ (HTML) — thêm vào đây nếu muốn
const OLD_POSTS = [
  {
    title: 'Từ bỏ hay đứng dậy?',
    date: '2025-06-30',
    category: 'Câu chuyện',
    result: null,
    image: null,
    excerpt: 'Sau một chuỗi thua lỗ, ranh giới giữa từ bỏ và đứng dậy mỏng đến mức đáng sợ...',
    href: '/nhat-ky/tu-bo-hay-dung-day.html',
    emoji: '⚔️'
  },
  {
    title: 'Hành trình của tôi',
    date: '2025-06-28',
    category: 'Câu chuyện',
    result: null,
    image: null,
    excerpt: 'Tôi không sinh ra biết trading. Đây là những gì thị trường đã dạy tôi...',
    href: '/nhat-ky/hanh-trinh-cua-toi.html',
    emoji: '🗺️'
  },
  {
    title: 'Nhật ký 28/06/2025',
    date: '2025-06-28',
    category: 'Nhật ký lệnh',
    result: 'Thua',
    image: null,
    excerpt: 'Thị trường đảo chiều bất ngờ. Ghi lại để học.',
    href: '/nhat-ky/2025-06-28.html',
    emoji: '📉'
  },
  {
    title: 'Nhật ký 26/06/2025',
    date: '2025-06-26',
    category: 'Nhật ký lệnh',
    result: 'Thua',
    image: null,
    excerpt: 'Hai lệnh ngược chiều nhau. Cả hai đều sai.',
    href: '/nhat-ky/2025-06-26.html',
    emoji: '📉'
  },
  {
    title: 'Nhật ký 24/06/2025',
    date: '2025-06-24',
    category: 'Nhật ký lệnh',
    result: 'Hoà vốn',
    image: null,
    excerpt: 'Đứng vững không phải là thắng, nhưng cũng không phải là thua.',
    href: '/nhat-ky/2025-06-24.html',
    emoji: '⚖️'
  },
];

// ─── FRONTMATTER PARSER ─────────────────────────────────────────────
function parseFrontmatter(raw) {
  const m = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (!m) return { meta: {}, body: raw };
  const meta = {};
  m[1].split('\n').forEach(line => {
    const [k, ...rest] = line.split(':');
    if (k) meta[k.trim()] = rest.join(':').trim().replace(/^["']|["']$/g,'');
  });
  return { meta, body: m[2] };
}

function excerpt(body, len = 120) {
  return body.replace(/#{1,6}\s.*\n?/g,'').replace(/!\[.*?\]\(.*?\)/g,'').replace(/\*\*|__|\*|_|`/g,'').replace(/\n/g,' ').trim().slice(0,len) + '…';
}

// ─── RENDER ─────────────────────────────────────────────────────────
let allPosts = [];
let activeFilter = 'all';

function resultClass(r) {
  if (!r) return '';
  if (r === 'Thắng') return 'result-win';
  if (r === 'Thua')  return 'result-lose';
  return 'result-break';
}

function resultLabel(r) {
  if (!r) return '';
  if (r === 'Thắng') return '✅ Thắng';
  if (r === 'Thua')  return '❌ Thua';
  return '⚖️ Hoà vốn';
}

function renderCard(post) {
  const imgHtml = post.image
    ? `<img class="card-img" src="${post.image}" alt="${post.title}" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="card-img-placeholder">${post.emoji || '📖'}</div>`;
  const resultBadge = post.result
    ? `<span class="card-result ${resultClass(post.result)}">${resultLabel(post.result)}</span>`
    : '';
  return `
  <a class="post-card" href="${post.href}">
    ${imgHtml}
    <div class="card-body">
      <div class="card-meta">
        <span class="card-cat">${post.category || 'Bài viết'}</span>
        ${resultBadge}
      </div>
      <div class="card-date">${formatDate(post.date)}</div>
      <h3>${post.title}</h3>
      <p>${post.excerpt || ''}</p>
      <div class="card-read">Đọc bài →</div>
    </div>
  </a>`;
}

function formatDate(d) {
  if (!d) return '';
  try {
    const dt = new Date(d);
    return dt.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
  } catch { return d; }
}

function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('.filter-btn');
  btns.forEach(b => { if (b.textContent.includes(cat === 'all' ? 'Tất cả' : cat)) b.classList.add('active'); });
  renderPosts();
}

function renderPosts() {
  const grid = document.getElementById('postsGrid');
  const filtered = activeFilter === 'all'
    ? allPosts
    : allPosts.filter(p => p.category === activeFilter);

  if (!filtered.length) {
    grid.innerHTML = `<div class="status-msg" style="grid-column:1/-1"><div class="icon">🔍</div><div>Chưa có bài nào trong danh mục này.</div></div>`;
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

// ─── LOAD MARKDOWN POSTS ────────────────────────────────────────────
async function loadMarkdownPosts() {
  try {
    const res = await fetch(API_BASE);
    if (!res.ok) throw new Error('GitHub API error');
    const files = await res.json();
    const mdFiles = files.filter(f => f.name.endsWith('.md'));

    const parsed = await Promise.all(mdFiles.map(async f => {
      try {
        const r = await fetch(RAW_BASE + f.name);
        const text = await r.text();
        const { meta, body } = parseFrontmatter(text);
        return {
          title:    meta.title || f.name.replace('.md',''),
          date:     meta.date ? meta.date.slice(0,10) : f.name.slice(0,10),
          category: meta.category || 'Bài viết',
          result:   meta.result || null,
          image:    meta.image  || null,
          excerpt:  excerpt(body),
          href:     `/nhat-ky/post.html?file=${encodeURIComponent(f.name.replace('.md',''))}`,
          emoji:    '📝',
          _ts:      meta.date || f.name,
        };
      } catch { return null; }
    }));

    return parsed.filter(Boolean);
  } catch (e) {
    console.warn('Could not fetch markdown posts:', e);
    return [];
  }
}

// ─── INIT ────────────────────────────────────────────────────────────
(async () => {
  const mdPosts = await loadMarkdownPosts();
  // Merge: markdown (mới nhất lên đầu) + bài HTML cũ
  const combined = [...mdPosts, ...OLD_POSTS].sort((a,b) => {
    const da = new Date(a.date || a._ts || '2000-01-01');
    const db = new Date(b.date || b._ts || '2000-01-01');
    return db - da;
  });
  allPosts = combined;

  if (!allPosts.length) {
    document.getElementById('postsGrid').innerHTML =
      `<div class="status-msg" style="grid-column:1/-1"><div class="icon">📭</div><div>Chưa có bài viết nào. Hãy đăng bài đầu tiên qua CMS!</div></div>`;
    return;
  }
  renderPosts();
})();
</script>
