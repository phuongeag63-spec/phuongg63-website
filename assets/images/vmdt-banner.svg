<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07040b"/>
      <stop offset="50%" style="stop-color:#0d0818"/>
      <stop offset="100%" style="stop-color:#07040b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd36a"/>
      <stop offset="100%" style="stop-color:#ff9f1c"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd36a"/>
      <stop offset="100%" style="stop-color:#ff9f1c"/>
    </linearGradient>
    <linearGradient id="redgold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ffd36a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,211,106,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="900" height="500" fill="url(#grid)"/>

  <!-- Orbs -->
  <circle cx="150" cy="150" r="250" fill="#ffd36a" opacity="0.05" filter="url(#bigglow)"/>
  <circle cx="800" cy="380" r="200" fill="#ff6b35" opacity="0.06" filter="url(#bigglow)"/>
  <circle cx="600" cy="100" r="150" fill="#24e6ff" opacity="0.03"/>

  <!-- Border -->
  <rect x="1.5" y="1.5" width="897" height="497" rx="20" fill="none" stroke="rgba(255,211,106,0.2)" stroke-width="1.5"/>
  <rect x="8" y="8" width="884" height="484" rx="16" fill="none" stroke="rgba(255,211,106,0.06)" stroke-width="1"/>

  <!-- Top badge -->
  <rect x="30" y="30" width="180" height="28" rx="14" fill="rgba(255,211,106,0.1)" stroke="rgba(255,211,106,0.3)" stroke-width="1"/>
  <text x="120" y="49" text-anchor="middle" font-family="Arial" font-weight="900" font-size="11" fill="#ffd36a" letter-spacing="2">⚔️ PHƯƠNG G63 ENTERPRISE</text>

  <!-- Version badge -->
  <rect x="690" y="30" width="180" height="28" rx="14" fill="rgba(255,107,53,0.15)" stroke="rgba(255,107,53,0.4)" stroke-width="1"/>
  <text x="780" y="49" text-anchor="middle" font-family="Arial" font-weight="900" font-size="11" fill="#ff9f1c" letter-spacing="1">VERSION 1.10 PROMAX</text>

  <!-- Main title -->
  <text x="450" y="175" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="14" fill="rgba(255,211,106,0.5)" letter-spacing="6">VÕ MỤC DI THƯ</text>
  <text x="450" y="240" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="68" fill="url(#gold)" filter="url(#glow)" letter-spacing="-2">G63</text>
  <text x="450" y="290" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="white" letter-spacing="1">SUNG LIÊN THANH</text>

  <!-- Subtitle -->
  <text x="450" y="330" text-anchor="middle" font-family="Arial" font-size="14" fill="rgba(255,255,255,0.45)">Trợ lý giao dịch thủ công — Quản lý lệnh thông minh cho MT5</text>

  <!-- Divider line -->
  <line x1="200" y1="350" x2="700" y2="350" stroke="rgba(255,211,106,0.15)" stroke-width="1"/>

  <!-- Feature pills -->
  <rect x="80" y="370" width="140" height="30" rx="15" fill="rgba(255,211,106,0.08)" stroke="rgba(255,211,106,0.2)" stroke-width="1"/>
  <text x="150" y="390" text-anchor="middle" font-family="Arial" font-weight="700" font-size="12" fill="rgba(255,211,106,0.8)">📊 Bảng điều khiển</text>

  <rect x="235" y="370" width="130" height="30" rx="15" fill="rgba(255,211,106,0.08)" stroke="rgba(255,211,106,0.2)" stroke-width="1"/>
  <text x="300" y="390" text-anchor="middle" font-family="Arial" font-weight="700" font-size="12" fill="rgba(255,211,106,0.8)">⚖️ Tính giá trung bình</text>

  <rect x="380" y="370" width="120" height="30" rx="15" fill="rgba(255,211,106,0.08)" stroke="rgba(255,211,106,0.2)" stroke-width="1"/>
  <text x="440" y="390" text-anchor="middle" font-family="Arial" font-weight="700" font-size="12" fill="rgba(255,211,106,0.8)">🛡️ Đồng bộ SL/TP</text>

  <rect x="515" y="370" width="110" height="30" rx="15" fill="rgba(255,211,106,0.08)" stroke="rgba(255,211,106,0.2)" stroke-width="1"/>
  <text x="570" y="390" text-anchor="middle" font-family="Arial" font-weight="700" font-size="12" fill="rgba(255,211,106,0.8)">✂️ Chốt 50% lời</text>

  <rect x="640" y="370" width="130" height="30" rx="15" fill="rgba(255,211,106,0.08)" stroke="rgba(255,211,106,0.2)" stroke-width="1"/>
  <text x="705" y="390" text-anchor="middle" font-family="Arial" font-weight="700" font-size="12" fill="rgba(255,211,106,0.8)">💰 Lợi nhuận thực</text>

  <!-- Price tag -->
  <rect x="330" y="420" width="240" height="50" rx="25" fill="url(#gold2)" filter="url(#glow)"/>
  <text x="450" y="452" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="22" fill="#07040b">🛒 666.000 VNĐ</text>

  <!-- Decorative sword icons -->
  <text x="50" y="260" font-size="60" opacity="0.06" fill="#ffd36a">⚔️</text>
  <text x="790" y="260" font-size="60" opacity="0.06" fill="#ffd36a">⚔️</text>

  <!-- Watermark -->
  <text x="870" y="490" text-anchor="end" font-family="Arial" font-size="10" fill="rgba(255,211,106,0.2)">phuongg63.com</text>
</svg>
