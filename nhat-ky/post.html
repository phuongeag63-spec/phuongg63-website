<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài viết | Phương G63</title>
<meta name="description" content="Nhật ký & bài viết từ Phương G63.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.2.0/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --gold:#ffd36a;--gold2:#ff9f1c;--bg:#07040b;--surface:#0f0b16;
  --surface2:#16101f;--cyan:#24e6ff;--muted:#6b6480;
  --green:#3ddc84;--red:#ff5c5c;
}

body{background:var(--bg);color:#fff;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:rgba(7,4,11,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,211,106,.12);padding:0 24px;display:flex;align-items:center;gap:20px;height:56px}
.nav-brand{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;white-space:nowrap}
.nav-links{display:flex;gap:16px;flex:1;flex-wrap:wrap}
.nav-links a{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--gold)}

/* ── HERO IMAGE ── */
.cover-img{width:100%;max-height:480px;object-fit:cover;display:block}
.cover-placeholder{width:100%;height:220px;background:linear-gradient(135deg,#1a1025,#0f0b16);display:flex;align-items:center;justify-content:center;font-size:56px}

/* ── ARTICLE ── */
.article-wrap{max-width:760px;margin:0 auto;padding:0 24px 80px}
.article-header{padding:40px 0 32px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:40px}
.meta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.badge-cat{font-size:11px;font-weight:900;letter-spacing:1px;padding:5px 12px;border-radius:999px;background:rgba(255,211,106,.12);color:var(--gold);text-transform:uppercase}
.badge-result{font-size:11px;font-weight:900;letter-spacing:1px;padding:5px 12px;border-radius:999px}
.result-win{background:rgba(61,220,132,.15);color:var(--green)}
.result-lose{background:rgba(255,92,92,.15);color:var(--red)}
.result-break{background:rgba(255,211,106,.1);color:rgba(255,211,106,.7)}
.article-date{font-size:13px;color:var(--muted)}
.article-header h1{font-size:clamp(26px,5vw,40px);font-weight:900;line-height:1.3;margin-top:16px;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── BODY CONTENT ── */
.article-body{font-size:16px;line-height:1.8;color:rgba(255,255,255,.85)}
.article-body h1,.article-body h2,.article-body h3,.article-body h4{font-weight:900;margin:2em 0 .8em;color:#fff}
.article-body h2{font-size:1.4em;border-bottom:1px solid rgba(255,211,106,.2);padding-bottom:8px}
.article-body h3{font-size:1.15em;color:var(--gold)}
.article-body p{margin-bottom:1.2em}
.article-body ul,.article-body ol{margin:0 0 1.2em 1.4em}
.article-body li{margin-bottom:.4em}
.article-body blockquote{border-left:3px solid var(--gold);padding:12px 20px;background:rgba(255,211,106,.06);border-radius:0 12px 12px 0;margin:1.5em 0;font-style:italic;color:rgba(255,255,255,.7)}
.article-body img{max-width:100%;border-radius:12px;margin:1.5em auto;display:block}
.article-body code{background:rgba(255,255,255,.08);padding:2px 8px;border-radius:5px;font-family:monospace;font-size:.9em}
.article-body pre{background:#0d0a14;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;overflow-x:auto;margin:1.5em 0}
.article-body pre code{background:none;padding:0}
.article-body hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:2em 0}
.article-body a{color:var(--gold);text-decoration:underline}

/* ── BACK BUTTON ── */
.back-btn{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;margin:32px 0 0;padding:10px 20px;border:1px solid rgba(255,255,255,.1);border-radius:999px;transition:all .2s}
.back-btn:hover{color:var(--gold);border-color:rgba(255,211,106,.4)}

/* ── STATUS ── */
.status-msg{text-align:center;padding:100px 24px;color:var(--muted);font-size:15px}
.status-msg .icon{font-size:48px;margin-bottom:20px}
.spinner{display:inline-block;width:36px;height:36px;border:3px solid rgba(255,211,106,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
footer{border-top:1px solid rgba(255,255,255,.06);padding:40px 24px;text-align:center;color:var(--muted);font-size:13px}
footer a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="/">⚔️ Phương G63</a>
  <div class="nav-links">
    <a href="/">Trang chủ</a>
    <a href="/#products">Sản phẩm</a>
    <a href="/blog.html">Nhật ký</a>
    <a href="https://zalo.me/84822299993" target="_blank">Zalo</a>
  </div>
</nav>

<div id="loading" class="status-msg">
  <div class="spinner"></div>
  <div style="margin-top:16px">Đang tải bài viết...</div>
</div>

<div id="app" style="display:none">
  <div id="coverWrap"></div>
  <div class="article-wrap">
    <a class="back-btn" href="/blog.html">← Quay lại nhật ký</a>
    <div class="article-header">
      <div class="meta-row" id="metaRow"></div>
      <div class="article-date" id="articleDate"></div>
      <h1 id="articleTitle"></h1>
    </div>
    <div class="article-body" id="articleBody"></div>
    <a class="back-btn" href="/blog.html">← Quay lại nhật ký</a>
  </div>
</div>

<div id="errorMsg" style="display:none" class="status-msg">
  <div class="icon">😔</div>
  <div>Không tìm thấy bài viết này.</div>
  <div style="margin-top:20px"><a href="/blog.html" style="color:var(--gold)">← Quay lại nhật ký</a></div>
</div>

<footer>
  <div style="margin-bottom:8px">© 2025 Phương G63 Enterprise</div>
  <div><a href="/">Trang chủ</a> · <a href="/#products">Sản phẩm</a> · <a href="https://zalo.me/84822299993">Zalo hỗ trợ</a></div>
</footer>

<script>
const REPO   = 'phuongeag63-spec/phuongg63-website';
const BRANCH = 'main';

// ─── FRONTMATTER ───────────────────────────────────────────────────
function parseFrontmatter(raw) {
  const m = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (!m) return { meta: {}, body: raw };
  const meta = {};
  m[1].split('\n').forEach(line => {
    const [k, ...rest] = line.split(':');
    if (k && rest.length) meta[k.trim()] = rest.join(':').trim().replace(/^["']|["']$/g,'');
  });
  return { meta, body: m[2] };
}

function formatDate(d) {
  if (!d) return '';
  try {
    return new Date(d).toLocaleDateString('vi-VN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  } catch { return d; }
}

function resultClass(r) {
  if (r === 'Thắng') return 'result-win';
  if (r === 'Thua')  return 'result-lose';
  return 'result-break';
}

function resultLabel(r) {
  if (r === 'Thắng') return '✅ Thắng';
  if (r === 'Thua')  return '❌ Thua';
  return '⚖️ Hoà vốn';
}

// ─── MAIN ──────────────────────────────────────────────────────────
(async () => {
  const params = new URLSearchParams(location.search);
  const file   = params.get('file');
  if (!file) { showError(); return; }

  const url = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/nhat-ky/${encodeURIComponent(file)}.md`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('not found');
    const raw = await res.text();
    const { meta, body } = parseFrontmatter(raw);

    // Update <title>
    if (meta.title) document.title = `${meta.title} | Phương G63`;
    if (meta.description) document.querySelector('meta[name="description"]').content = meta.description;

    // Cover image
    const coverWrap = document.getElementById('coverWrap');
    if (meta.image) {
      const img = document.createElement('img');
      img.className = 'cover-img';
      img.src = meta.image;
      img.alt = meta.title || '';
      img.onerror = () => coverWrap.innerHTML = '';
      coverWrap.appendChild(img);
    } else {
      coverWrap.innerHTML = `<div class="cover-placeholder">📝</div>`;
    }

    // Meta row
    const metaRow = document.getElementById('metaRow');
    if (meta.category) metaRow.innerHTML += `<span class="badge-cat">${meta.category}</span>`;
    if (meta.result)   metaRow.innerHTML += `<span class="badge-result ${resultClass(meta.result)}">${resultLabel(meta.result)}</span>`;

    // Date & title
    document.getElementById('articleDate').textContent = formatDate(meta.date);
    document.getElementById('articleTitle').textContent = meta.title || file;

    // Body — render markdown
    if (typeof marked !== 'undefined') {
      marked.setOptions({ breaks: true, gfm: true });
      document.getElementById('articleBody').innerHTML = marked.parse(body);
    } else {
      document.getElementById('articleBody').innerText = body;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display     = 'block';
  } catch (e) {
    showError();
  }
})();

function showError() {
  document.getElementById('loading').style.display  = 'none';
  document.getElementById('errorMsg').style.display = 'block';
}
</script>
</body>
</html>
